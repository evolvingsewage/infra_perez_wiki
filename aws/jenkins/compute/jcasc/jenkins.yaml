jenkins:
  systemMessage: "infra_perez_wiki's ephemeral Jenkins: call her IPWEJ"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          password: "${ADMIN_PASSWORD}"
  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:admin"

credentials:
  system:
    domainCredentials:
      - credentials:
          - basicSSHUserPrivateKey:
              scope: GLOBAL
              id: linode-ssh-key
              username: jenkins-deploy
              privateKeySource:
                directEntry:
                  privateKey: "${LINODE_SSH_KEY}"

jobs:
  # The pipeline itself (test -> deploy -> smoke) lives in perez_wiki's
  # Jenkinsfile. This job just checks it out and runs it, so infra owns the
  # runner and perez_wiki owns how it's built/tested/deployed.
  - script: >
      pipelineJob('deploy-perez-wiki') {
        definition {
          cpsScm {
            scm {
              git {
                remote { url('https://github.com/isa-p941/perez_wiki.git') }
                branch('main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
